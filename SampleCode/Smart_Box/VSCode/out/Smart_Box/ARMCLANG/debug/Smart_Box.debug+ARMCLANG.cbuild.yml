  compiler: AC6
  device: Nuvoton::M487JIDAE
  device-pack: Nuvoton::NuMicroM4_DFP@1.0.1
  processor:
    fpu: sp
    core: Cortex-M4
  packs:
    - pack: Nuvoton::NuMicroM4_DFP@1.0.1
      path: ${CMSIS_PACK_ROOT}/Nuvoton/NuMicroM4_DFP/1.0.1
  optimize: debug
  misc:
    ASM:
      - -D__MICROLIB
    C:
      - -std=c99
      - -fno-rtti
      - -funsigned-char
      - -fshort-enums
      - -fshort-wchar
      - -ffunction-sections
      - -fdata-sections
      - -D__MICROLIB
      - -o0
      - -gdwarf-4
    Link:
      - --library_type=microlib
      - --map
      - --load_addr_map_info
      - --symbols
      - --info sizes
      - --info totals
      - --entry Reset_Handler
      - --summary_stderr
      - --info summarysizes
      - --diag_suppress=6314
