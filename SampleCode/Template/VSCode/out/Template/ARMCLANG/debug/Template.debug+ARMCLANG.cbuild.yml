build:
  generated-by: csolution version 2.11.0
  solution: ../../../../Template.csolution.yml
  project: ../../../../Template.cproject.yml
  context: Template.debug+ARMCLANG
  compiler: AC6
  device: Nuvoton::M487JIDAE
  device-pack: Nuvoton::NuMicroM4_DFP@1.0.1
  processor:
    fpu: sp
    core: Cortex-M4
  packs:
    - pack: Nuvoton::NuMicroM4_DFP@1.0.1
      path: ${CMSIS_PACK_ROOT}/Nuvoton/NuMicroM4_DFP/1.0.1
  optimize: debug
  misc:
    ASM:
      - -D__MICROLIB
    C:
      - -std=c99
      - -fno-rtti
      - -funsigned-char
      - -fshort-enums
      - -fshort-wchar
      - -ffunction-sections
      - -fdata-sections
      - -D__MICROLIB
      - -o0
      - -gdwarf-4
    Link:
      - --library_type=microlib
      - --map
      - --load_addr_map_info
      - --symbols
      - --info sizes
      - --info totals
      - --entry Reset_Handler
      - --summary_stderr
      - --info summarysizes
      - --diag_suppress=6314
  add-path:
    - ../../../../../../../Library/Device/Nuvoton/M480/Include
    - ../../../../../../../Library/StdDriver/inc
    - ../../../../../../../Library/CMSIS/Include
    - ${CMSIS_PACK_ROOT}/Nuvoton/NuMicroM4_DFP/1.0.1/Device/M480/Include
  add-path-asm:
    - ${CMSIS_PACK_ROOT}/Nuvoton/NuMicroM4_DFP/1.0.1/Device/M480/Include
  output-dirs:
    intdir: ../../../../tmp
    outdir: .
    rtedir: ../../../../RTE
  output:
    - type: bin
      file: Template.bin
    - type: elf
      file: Template.axf
  linker:
    script: ../../../../RTE/Device/M487JIDAE/ac6_linker_script.sct.src
    regions: ../../../../RTE/Device/M487JIDAE/regions_M487JIDAE.h
  groups:
    - group: CMSIS
      files:
        - file: ../../../../../../../Library/Device/Nuvoton/M480/Source/ARM/startup_M480_vsac6.S
          category: sourceAsm
        - file: ../../../../../../../Library/Device/Nuvoton/M480/Source/system_M480.c
          category: sourceC
    - group: Library
      files:
        - file: ../../../../../../../Library/StdDriver/src/retarget.c
          category: sourceC
        - file: ../../../../../../../Library/StdDriver/src/uart.c
          category: sourceC
        - file: ../../../../../../../Library/StdDriver/src/sys.c
          category: sourceC
        - file: ../../../../../../../Library/StdDriver/src/clk.c
          category: sourceC
    - group: User
      files:
        - file: ../../../../../main.c
          category: sourceC
  licenses:
    - license: <unknown>
      packs:
        - pack: Nuvoton::NuMicroM4_DFP@1.0.1
