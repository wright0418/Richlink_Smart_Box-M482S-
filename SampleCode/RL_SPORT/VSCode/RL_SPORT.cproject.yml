project:
  packs:
    - pack: Nuvoton::NuMicroM4_DFP
  misc:
    - for-compiler: AC6
      C:
        [
          -std=c99,
          -fno-rtti,
          -funsigned-char,
          -fshort-enums,
          -fshort-wchar,
          -ffunction-sections,
          -fdata-sections,
          -D__MICROLIB,
          -O0,
          -gdwarf-4,
        ]
      ASM: [-D__MICROLIB]
      Link:
        [
          --library_type=microlib,
          --map,
          --load_addr_map_info,
          --symbols,
          --info sizes,
          --info totals,
          --entry Reset_Handler,
          --summary_stderr,
          --info summarysizes,
          --diag_suppress=6314,
        ]
    # GCC-specific flags removed; this project is configured for AC6/ARMCLANG only

  setups:
    - output:
        type: ["elf", "bin"]
    - define:
        - ARM_MATH_CM4
        - __FPU_PRESENT
  # linker: GCC linker script removed; AC6 will use its own scatter file configuration
  add-path:
    - ../../../Library/Device/Nuvoton/M480/Include
    - ../../../Library/StdDriver/inc
    - ../../../Library/CMSIS/Include
  groups:
    - group: CMSIS
      files:
        - file: ../../../Library/Device/Nuvoton/M480/Source/ARM/startup_M480_vsac6.S
          for-compiler: AC6
        - file: ../../../Library/Device/Nuvoton/M480/Source/system_M480.c
    - group: Library
      files:
        - file: ../../../Library/StdDriver/src/retarget.c
        - file: ../../../Library/StdDriver/src/uart.c
        - file: ../../../Library/StdDriver/src/sys.c
        - file: ../../../Library/StdDriver/src/clk.c
        - file: ../../../Library/StdDriver/src/gpio.c
        - file: ../../../Library/StdDriver/src/i2c.c
        - file: ../../../Library/StdDriver/src/spi.c
        - file: ../../../Library/StdDriver/src/pdma.c
        - file: ../../../Library/StdDriver/src/eadc.c
        - file: ../../../Library/StdDriver/src/timer.c
        - file: ../../../Library/StdDriver/src/usbd.c
        - file: ../../../Library/StdDriver/src/fmc.c
        - file: ../../../Library/CMSIS/Lib/ARM/arm_cortexM4lf_math.lib
          for-compiler: AC6
    - group: User
      files:
        - file: ../main.c
        - file: ../drivers/timer.c
        - file: ../system_status.c
        - file: ../app/game_logic.c
        - file: ../ble.c
        - file: ../protocol/ble_parser.c
        - file: ../protocol/mole_packet.c
        - file: ../ble_at_repl.c
        - file: ../drivers/led.c
        - file: ../drivers/ws2812b.c
        - file: ../drivers/ws2812b_digits.c
        - file: ../drivers/ws2812b_templates.c
        - file: ../drivers/ws2812b_patterns.c
        - file: ../drivers/buzzer.c
        - file: ../board/gpio.c
        - file: ../drivers/adc.c
        - file: ../test_mode.c
        - file: ../board/usb_hid/usb_hid_mouse.c
        - file: ../board/usb_hid/usb_hid_mouse_desc.c
        - file: ../drivers/gsensor.c
        - file: ../app/mole_game.c
        - file: ../app/squat_mode.c
        - file: ../app/algorithms/mole_hit_detect.c
        - file: ../app/algorithms/squat_detect.c
        - file: ../app/algorithms/gsensor_jump_detect.c
        - file: ../app/algorithms/hall_anticheat.c
        - file: ../drivers/i2c.c
        - file: ../board/board_test_gpio.c
        - file: ../board/power_mgmt.c
