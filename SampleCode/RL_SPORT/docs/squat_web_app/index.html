<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squat BLE Web App</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .wrap {
            width: min(760px, 100%);
            display: grid;
            gap: 16px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 14px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.3rem;
            color: #93c5fd;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 8px;
        }

        button {
            background: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        button.primary {
            background: #2563eb;
            border-color: #1d4ed8;
            color: white;
        }

        .status {
            display: grid;
            grid-template-columns: repeat(2, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .stat {
            background: #0b1220;
            border: 1px solid #1f2937;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f8fafc;
            margin-top: 6px;
        }

        .hint {
            color: #94a3b8;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>深蹲 BLE 控制台（單一裝置）</h1>
            <div class="row">
                <button id="btnConnect" class="primary">連線 BLE</button>
                <button id="btnDisconnect">斷線</button>
                <button id="btnStartReset" class="primary">開始並歸零</button>
                <button id="btnStartStateStream">啟用狀態串流</button>
                <button id="btnStopStateStream">停止狀態串流</button>
            </div>
            <div class="row">
                <span>連線狀態：</span>
                <strong id="connText">未連線</strong>
            </div>
            <div class="row hint">
                頁面 Log 預設關閉。若要開啟除錯，請在 console 執行：
                <code>enableSquatDebug(true)</code>
            </div>
        </div>

        <div class="card">
            <h1>狀態與次數</h1>
            <div class="status">
                <div class="stat">
                    <div class="label">STATE</div>
                    <div class="value" id="stateText">IDLE</div>
                </div>
                <div class="stat">
                    <div class="label">COUNT</div>
                    <div class="value" id="countText">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const UUID = {
            SERVICE: '524cacc0-3c17-d293-8e48-14fe2e4da212',
            RX: '0000d002-0000-1000-8000-00805f9b34fb',
            TX: '0000d001-0000-1000-8000-00805f9b34fb'
        };

        const ui = {
            btnConnect: document.getElementById('btnConnect'),
            btnDisconnect: document.getElementById('btnDisconnect'),
            btnStartReset: document.getElementById('btnStartReset'),
            btnStartStateStream: document.getElementById('btnStartStateStream'),
            btnStopStateStream: document.getElementById('btnStopStateStream'),
            connText: document.getElementById('connText'),
            stateText: document.getElementById('stateText'),
            countText: document.getElementById('countText')
        };

        let bleDevice = null;
        let txChar = null;
        let rxChar = null;
        const decoder = new TextDecoder();

        // 預設關閉；可在 console 用 enableSquatDebug(true) 開啟
        window.SQUAT_WEB_DEBUG = false;
        window.enableSquatDebug = function (enabled) {
            window.SQUAT_WEB_DEBUG = !!enabled;
            console.log(`[SQUAT_WEB_DEBUG] ${window.SQUAT_WEB_DEBUG ? 'ON' : 'OFF'}`);
        };

        function debugLog(msg) {
            if (!window.SQUAT_WEB_DEBUG) return;
            const t = new Date().toLocaleTimeString();
            console.log(`[${t}] ${msg}`);
        }

        function setConn(connected) {
            ui.connText.textContent = connected ? '已連線' : '未連線';
            ui.connText.style.color = connected ? '#22c55e' : '#f87171';
        }

        function parseKvCsv(line) {
            const obj = {};
            const parts = line.split(',');
            for (const p of parts) {
                const i = p.indexOf('=');
                if (i <= 0) continue;
                const k = p.slice(0, i).trim();
                const v = p.slice(i + 1).trim();
                obj[k] = v;
            }
            return obj;
        }

        async function sendLine(line) {
            if (!txChar) {
                debugLog('尚未連線，無法發送');
                return;
            }
            const payload = new TextEncoder().encode(`${line}\r\n`);
            try {
                if (txChar.writeValueWithoutResponse && txChar.properties.writeWithoutResponse) {
                    await txChar.writeValueWithoutResponse(payload);
                } else {
                    await txChar.writeValue(payload);
                }
                debugLog(`TX: ${line}`);
            } catch (err) {
                debugLog(`TX 失敗: ${err.message || err}`);
            }
        }

        function handleTextLine(line) {
            const t = line.trim();
            if (!t) return;
            debugLog(`RX: ${t}`);

            if (t.startsWith('+DATA,SQUAT_STATE,')) {
                const kv = parseKvCsv(t.slice('+DATA,SQUAT_STATE,'.length));
                const state = kv.STATE || 'IDLE';
                const count = parseInt(kv.COUNT || '0', 10);
                ui.stateText.textContent = state;
                ui.countText.textContent = Number.isFinite(count) ? String(count) : '0';
            }

            if (t.startsWith('+OK,SQUAT_INFO,')) {
                const kv = parseKvCsv(t.slice('+OK,SQUAT_INFO,'.length));
                const state = kv.PHASE || 'IDLE';
                const count = parseInt(kv.COUNT || '0', 10);
                ui.stateText.textContent = state;
                ui.countText.textContent = Number.isFinite(count) ? String(count) : '0';
            }
        }

        async function connectBle() {
            if (!navigator.bluetooth) {
                alert('目前瀏覽器不支援 Web Bluetooth');
                return;
            }

            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [UUID.SERVICE] }],
                    optionalServices: [UUID.SERVICE]
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(UUID.SERVICE);
                txChar = await service.getCharacteristic(UUID.TX);
                rxChar = await service.getCharacteristic(UUID.RX);

                if (rxChar) {
                    await rxChar.startNotifications();
                    rxChar.addEventListener('characteristicvaluechanged', (ev) => {
                        const data = new Uint8Array(ev.target.value.buffer);
                        const text = decoder.decode(data);
                        text.split(/\r?\n/).forEach(handleTextLine);
                    });
                }

                bleDevice.addEventListener('gattserverdisconnected', () => {
                    setConn(false);
                    debugLog('BLE 已斷線');
                    txChar = null;
                    rxChar = null;
                });

                setConn(true);
                debugLog(`BLE 已連線: ${bleDevice.name || bleDevice.id}`);
                await sendLine('AT+TEST,SQUAT_STREAM,START,STATE,200');
                await sendLine('AT+TEST,SQUAT_INFO');
            } catch (err) {
                debugLog(`連線失敗: ${err.message || err}`);
                setConn(false);
                alert(`連線失敗: ${err.message || err}`);
            }
        }

        async function disconnectBle() {
            try {
                if (bleDevice?.gatt?.connected) {
                    bleDevice.gatt.disconnect();
                }
            } catch (err) {
                debugLog(`斷線失敗: ${err.message || err}`);
            }
            txChar = null;
            rxChar = null;
            setConn(false);
        }

        ui.btnConnect.addEventListener('click', connectBle);
        ui.btnDisconnect.addEventListener('click', disconnectBle);
        ui.btnStartReset.addEventListener('click', async () => {
            await sendLine('AT+TEST,SQUAT_START');
            await sendLine('AT+TEST,SQUAT_RESET');
        });
        ui.btnStartStateStream.addEventListener('click', () => sendLine('AT+TEST,SQUAT_STREAM,START,STATE,200'));
        ui.btnStopStateStream.addEventListener('click', () => sendLine('AT+TEST,SQUAT_STREAM,STOP'));

        setConn(false);
    </script>
</body>

</html>
