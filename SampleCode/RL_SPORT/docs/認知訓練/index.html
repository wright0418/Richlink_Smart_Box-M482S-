            el.innerText = name || '';
        }

        // 顯示一個 modal 要求使用者按下「掃描並綁定」以觸發 requestDevice (必須來自 user gesture)
        function promptUserScan(slot) {
            return new Promise((resolve) => {
                const backdrop = document.createElement('div');
                backdrop.className = 'scan-modal-backdrop';
                const modal = document.createElement('div');
                modal.className = 'scan-modal';
                modal.innerHTML = `<div style="font-weight:bold;margin-bottom:8px;">Slot ${slot}：請選擇裝置並按下掃描</div>
                    <div style="font-size:0.9rem;color:#ccc;margin-bottom:12px;">請在裝置選單中選擇要綁定到此 Slot 的裝置。</div>`;

                const scanBtn = document.createElement('button');
                scanBtn.innerText = '掃描並綁定';
                const cancelBtn = document.createElement('button');
                cancelBtn.innerText = '取消';

                scanBtn.addEventListener('click', async () => {
                    scanBtn.disabled = true; cancelBtn.disabled = true;
                    scanBtn.innerText = '掃描中...';
                    try {
                        const ok = await RealBLEAdapter.requestAndConnect(slot, { serviceOnly: true });
                        document.body.removeChild(backdrop);
                        resolve(!!ok);
                    } catch (e) {
                        document.body.removeChild(backdrop);
                        resolve(false);
                    }
                });

                cancelBtn.addEventListener('click', () => {
                    document.body.removeChild(backdrop);
                    resolve(false);
                });

                modal.appendChild(scanBtn);
                modal.appendChild(cancelBtn);
                backdrop.appendChild(modal);
                document.body.appendChild(backdrop);
                // focus the scan button for keyboard accessibility
                scanBtn.focus();
            });
        }

        // ==========================================
        // 5. 初始化與遊戲流程
        // ==========================================
        const ui = {
            score: document.getElementById('scoreDisplay'),
            time: document.getElementById('timeDisplay'),
            mission: document.getElementById('missionPanel'),
            log: document.getElementById('logArea'),
            gameArea: document.getElementById('gameArea'),
            levelSelect: document.getElementById('levelSelect'),
            customDuration: document.getElementById('customDuration'),

            btnStart: document.getElementById('startBtn'),
            deviceCountSelect: document.getElementById('deviceCountSelect'),
            btnStartConnect: document.getElementById('btnStartConnect')
        };

        // 全域快速連接旗標（永遠啟用）
        let FAST_CONNECT = true;

        function init() {
            ui.gameArea.innerHTML = '';
            gameState.devices = [];
            for (let i = 1; i <= CONFIG.TOTAL_DEVICES; i++) {
                const div = document.createElement('div');
                div.id = `dev-${i}`;
                div.className = 'device-container';
                ui.gameArea.appendChild(div);
                gameState.devices.push(new VirtualBLEDevice(i, `dev-${i}`));
            }

            // 預設使用全部裝置，之後使用者可於連線時選擇較少數量
            setActiveDeviceCount(CONFIG.TOTAL_DEVICES);

            ui.levelSelect.innerHTML = '';
            CONFIG.LEVELS.forEach((lvl, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.innerText = lvl.name;
                ui.levelSelect.appendChild(opt);
            });
            ui.levelSelect.addEventListener('change', updateLevelInfo);
            if (ui.customDuration) ui.customDuration.addEventListener('input', updateLevelInfo);
            updateLevelInfo();

            // 永遠使用快速連線，UI 選項移除

            initEngineeringUI();
            initSingleBleUI();
        }

        function updateLevelInfo() {
            const lvl = CONFIG.LEVELS[ui.levelSelect.value];
            // 若使用者輸入了自訂時間，優先顯示自訂值
            const cust = ui.customDuration && parseInt(ui.customDuration.value);
            ui.time.innerText = (cust && cust > 0) ? cust : lvl.duration;
            ui.mission.innerText = `模式: ${lvl.desc}`;
            ui.mission.style.display = 'block';
            // 若為 L3 或 L4，額外播放中文語音提示
            if (lvl.id === 'L3') {
                TTSManager.speak(`${lvl.desc}`);
                TTSManager.speak(`${lvl.desc}`);
            }
        }

        function log(msg, type = 'log-sys') {
            ui.log.innerHTML = `<span class="${type}">[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}</span><br>` + ui.log.innerHTML;
        }

        // 逐一綁定實體裝置並於全部連接後自動開始遊戲
        async function connectDevicesSequential(count) {
            SoundManager.init();
            ui.btnStartConnect.disabled = true;
            // 設定並顯示要使用的裝置數量
            setActiveDeviceCount(count);
            log(`[BLE] 開始逐一連接 ${count} 台裝置...`, 'log-sys');
            for (let slot = 1; slot <= count; slot++) {
                // 標示目前要連接的 slot
                setConnectingSlot(slot, true);
                setDeviceNameOnTile(slot, '掃描中...');
                let ok = false;
                while (!ok) {
                    log(`[BLE] 請掃描並選擇要綁定到 Slot ${slot} 的裝置...`, 'log-sys');
                    // 等待使用者按下 modal 裡的掃描按鈕（該按鈕的 click handler 會呼叫 requestDevice）
                    ok = await promptUserScan(slot);
                    if (!ok) {
                        const retry = confirm(`Slot ${slot} 連接失敗或取消。是否重試連接此 slot? 按確定重試，按取消終止整個連線流程`);
                        if (!retry) {
                            log('[BLE] 使用者中止連線流程', 'log-sys');
                            setConnectingSlot(slot, false);
                            setDeviceNameOnTile(slot, '');
                            ui.btnStartConnect.disabled = false;
                            return false;
                        }
                    }
                }
                // 連線成功，從 adapter 取得裝置名稱並顯示
                try {
                    const conn = RealBLEAdapter.connections.get(slot);
                    if (conn && conn.device) setDeviceNameOnTile(slot, conn.device.name || conn.device.id);
                } catch (e) { /* ignore */ }
                // 顯示首次連線打勾（模擬或真實裝置綁定成功皆適用）
                // 注意：不在此處立即 clear，保留提示直到遊戲回合開始時統一清畫面。
                try {
                    const dev = gameState.devices.find(d => d.id === slot);
                    if (dev) {
                        if (RealBLEAdapter.hasConnection(slot)) {
                            try {
                                await RealBLEAdapter.write(slot, PROTOCOL.packBrightnessCmd(80));
                            } catch (e) { /* ignore */ }
                        }
                        dev.update(BITMAPS.CHECK, 'white', false);
                    }
                } catch (e) { /* ignore */ }
                setConnectingSlot(slot, false);
            }
            log('[BLE] 所有裝置已連接', 'log-sys');
            // 5 秒倒數後開始遊戲（固定為 5 秒）
            for (let i = 5; i >= 1; i--) {
                ui.mission.innerText = `所有裝置已連接，遊戲將於 ${i} 秒後開始`;
                await wait(1000);
            }
            ui.mission.innerText = '遊戲開始！';
            ui.btnStartConnect.disabled = false;
            startGame();
            return true;
        }

        // (connectRealBtn 已移除)

        ui.btnStartConnect.addEventListener('click', async () => {
            const cnt = parseInt(ui.deviceCountSelect.value) || 4;
            if (cnt < 2 || cnt > CONFIG.TOTAL_DEVICES) return log('[BLE] 請選擇 2 到 6 台裝置', 'log-sys');
            // 若目前顯示為重新連接（已連過一次），先斷開再進行新一輪配對
            const isReconnect = ui.btnStartConnect.innerText && ui.btnStartConnect.innerText.trim() === '重新連接';
            if (isReconnect) {
                log('[BLE] 使用者要求重新連接：先斷開所有裝置', 'log-sys');
                await RealBLEAdapter.disconnectAll();
                // 清除 UI 上的裝置名稱顯示
                for (let i = 1; i <= CONFIG.TOTAL_DEVICES; i++) setDeviceNameOnTile(i, '');
                ui.btnStartConnect.innerText = '開始連接裝置';
                // 再啟動連線流程
                await connectDevicesSequential(cnt);
                return;
            }
            const ok = await connectDevicesSequential(cnt);
            if (ok) {
                // 成功連接所有裝置後，切換按鈕為重新連接
                ui.btnStartConnect.innerText = '重新連接';
            }
        });

        document.getElementById('soundBtn').addEventListener('click', (e) => {
            const on = SoundManager.toggle();
            e.target.innerText = on ? "🔊 音效: 開" : "🔈 音效: 關";
            e.target.classList.toggle('active', on);
        });

        ui.btnStart.addEventListener('click', startGame);

        function startGame() {
            if (gameState.isPlaying) return;
            const lvlIdx = ui.levelSelect.value;
            gameState.level = CONFIG.LEVELS[lvlIdx];
            gameState.score = 0;
            gameState.isPlaying = true;
            gameState.activeTargets.clear();
            resetModeState();

            ui.score.innerText = 0;
            // 使用自訂時間（若填寫）或關卡預設時間
            const cust = ui.customDuration && parseInt(ui.customDuration.value);
            const startTime = (cust && cust > 0) ? cust : gameState.level.duration;
            ui.time.innerText = startTime;
            ui.btnStart.disabled = true;
            ui.levelSelect.disabled = true;
            ui.mission.innerText = gameState.level.desc;
            ui.mission.style.borderColor = '#ffd700';

            SoundManager.sfx.start();
            log(`開始關卡: ${gameState.level.name}`, 'log-sys');

            let timeLeft = startTime;
            gameState.timer = setInterval(() => {
                timeLeft--;
                ui.time.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            spawnCycle();
        }

        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timer);
            clearTimeout(gameState.spawnTimer);
            resetModeState();
            gameState.devices.forEach(d => d.clear());
            clearTargetPreview();

            ui.btnStart.disabled = false;
            ui.btnStart.innerText = "再玩一次";
            ui.levelSelect.disabled = false;
            ui.mission.innerText = "遊戲結束";
            SoundManager.sfx.win();
            log(`遊戲結束，最終分數: ${gameState.score}`, 'log-sys');
        }

        async function spawnCycle() {
            if (!gameState.isPlaying) return;

            // Smart Filter 會過濾掉不必要的 clear 封包
            gameState.devices.forEach(d => d.clear());
            gameState.activeTargets.clear();
            // 清除上次目標預覽
            clearTargetPreview();

            const mode = gameState.level.mode;
            const active = gameState.activeCount || CONFIG.TOTAL_DEVICES;
            const devs = [...gameState.devices.slice(0, active)].sort(() => 0.5 - Math.random());

            if (mode === 'CLASSIC') {
                const t = devs[0]; t.update(BITMAPS.MOLE, 'yellow', true);
                gameState.activeTargets.set(t.id, { type: 'valid' });
                updateTargetPreview(BITMAPS.MOLE, 'yellow');
            }
            else if (mode === 'BOMB') {
                devs[0].update(BITMAPS.CIRCLE, 'green', true); gameState.activeTargets.set(devs[0].id, { type: 'valid' });
                devs[1].update(BITMAPS.CROSS, 'red', false); gameState.activeTargets.set(devs[1].id, { type: 'bomb' });
                updateTargetPreview(BITMAPS.CIRCLE, 'green');
            }
            else if (mode === 'NUMBER_HUNT') {
                const target = Math.floor(Math.random() * 10);
                ui.mission.innerText = `找出 [ ${target} ]`;
                // 選一個隨機的裝置當目標，並讓所有啟用裝置都顯示數字與隨機顏色
                const COLORS_AVAILABLE = ['red', 'green', 'blue', 'yellow', 'purple', 'white'];
                const targetIndex = Math.floor(Math.random() * devs.length);
                let targetColor = null;
                for (let i = 0; i < devs.length; i++) {
                    const dev = devs[i];
                    // 隨機顏色
                    const color = COLORS_AVAILABLE[Math.floor(Math.random() * COLORS_AVAILABLE.length)];
                    if (i === targetIndex) {
                        // 目標裝置顯示目標數字，但顏色也隨機（不一定是藍色）
                        dev.update(NUMBERS[target], color, true);
                        gameState.activeTargets.set(dev.id, { type: 'valid' });
                        targetColor = color;
                    } else {
                        // 隨機選個數字，避免與目標相同
                        let randNum = Math.floor(Math.random() * 10);
                        if (randNum === target) randNum = (randNum + 1) % 10;
                        dev.update(NUMBERS[randNum], color, false);
                        gameState.activeTargets.set(dev.id, { type: 'invalid' });
                    }
                }

                // 顯示目標預覽
                updateTargetPreview(NUMBERS[target], targetColor || 'yellow');

                // 標記為正在等待玩家按下
                gameState.awaitingPress = true;
                // 開始語音並等待結束
                await speakAndLock(`數字 ${target}`);
                // 若在語音結束前玩家已按下(有效命中)，handleDeviceInput 會把 awaitingPress 設為 false 並排程下一輪
                if (gameState.awaitingPress) {
                    // 若仍未按下，清除等待狀態並在 interval 後繼續
                    gameState.awaitingPress = false;
                    gameState.spawnTimer = setTimeout(spawnCycle, gameState.level.interval);
                }
                return; // 已排程或由按下事件排程，結束本次 spawnCycle
            }
            else if (mode === 'COLOR_RUSH') {
                const cs = ['red', 'green', 'blue']; const cn = { 'red': '紅', 'green': '綠', 'blue': '藍' };
                const t = cs[Math.floor(Math.random() * 3)];
                ui.mission.innerText = `打${cn[t]}色O`; ui.mission.style.borderColor = t;
                // 設定裝置顏色與目標標記
                for (let i = 0; i < 3 && i < devs.length; i++) {
                    let color;
                    if (i === 0) {
                        color = t;
                    } else {
                        const otherColors = cs.filter(color => color !== t);
                        color = otherColors[Math.floor(Math.random() * otherColors.length)];
                    }
                    const isT = (i === 0);
                    devs[i].update(BITMAPS.CIRCLE, color, isT);
                    gameState.activeTargets.set(devs[i].id, { type: isT ? 'valid' : 'invalid' });
                }
                for (let i = 3; i < devs.length; i++) {
                    const dev = devs[i];
                    const otherColors = cs.filter(color => color !== t);
                    const color = otherColors[Math.floor(Math.random() * otherColors.length)];
                    dev.update(BITMAPS.CIRCLE, color, false);
                    gameState.activeTargets.set(dev.id, { type: 'invalid' });
                }
                // 顯示目標預覽（以目標顏色）
                updateTargetPreview(BITMAPS.CIRCLE, t);

                // 等待語音結束或玩家按下後再進入下一輪
                gameState.awaitingPress = true;
                await speakAndLock(`打${cn[t]}色O`);
                if (gameState.awaitingPress) {
                    gameState.awaitingPress = false;
                    gameState.spawnTimer = setTimeout(spawnCycle, gameState.level.interval);
                }
                return;
            }
            else if (mode === 'LOGIC_CHAOS') {
                const targetLetter = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
                const decoyLetters = ALPHABET.filter(l => l !== targetLetter);
                ui.mission.innerText = `找到紅色的英文字母 [ ${targetLetter} ]`;
                for (let i = 0; i < devs.length; i++) {
                    const dev = devs[i];
                    if (i === 0) {
                        dev.update(getLetterBitmap(targetLetter), 'red', true);
                        gameState.activeTargets.set(dev.id, { type: 'valid' });
                    } else if (i === 1) {
                        const letter = decoyLetters[Math.floor(Math.random() * decoyLetters.length)];
                        dev.update(getLetterBitmap(letter), 'green', false);
                        gameState.activeTargets.set(dev.id, { type: 'invalid' });
                    } else if (i === 2) {
                        const letter = decoyLetters[Math.floor(Math.random() * decoyLetters.length)];
                        dev.update(getLetterBitmap(letter), 'yellow', false);
                        gameState.activeTargets.set(dev.id, { type: 'invalid' });
                    } else {
                        if (Math.random() < 0.5) {
                            const shape = Math.random() > 0.5 ? BITMAPS.CIRCLE : BITMAPS.SQUARE;
                            const colors = ['blue', 'purple', 'white'];
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            dev.update(shape, color, false);
                        } else {
                            const letter = decoyLetters[Math.floor(Math.random() * decoyLetters.length)];
                            const colors = ['green', 'blue', 'purple', 'white'];
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            dev.update(getLetterBitmap(letter), color, false);
                        }
                        gameState.activeTargets.set(dev.id, { type: 'invalid' });
                    }
                }
                updateTargetPreview(getLetterBitmap(targetLetter), 'red');

                gameState.awaitingPress = true;
                await speakAndLock(`紅色字母${targetLetter}`);
                if (gameState.awaitingPress) {
                    // 維持等待，等待使用者自行按下目標
                }
                return;
            }
            else if (mode === 'SEQUENCE_STRIKE') {
                startSequenceRound(devs);
                return;
            }
            else if (mode === 'PAIR_SYNC') {
                startPairRound(devs);
                return;
            }
            else if (mode === 'CHASE_BEACON') {
                startChaseRound(devs);
                return;
            }
            else if (mode === 'CODE_SWAPPER') {
                startCodeRound(devs);
                return;
            }
            else if (mode === 'FRENZY_RUSH') {
                startFrenzyRound(devs);
                return;
            }
            else if (mode === 'MATH_QUICK') {
                await startMathQuickRound(devs);
                return;
            }

            SoundManager.sfx.spawn();
            gameState.spawnTimer = setTimeout(spawnCycle, gameState.level.interval);
        }

        function restartSequenceRound(reason) {
            if (!gameState.isPlaying || !gameState.level || gameState.level.mode !== 'SEQUENCE_STRIKE') return;
            if (reason) log(`[Sequence] ${reason}，重新開始`, 'log-sys');
            clearTimeout(gameState.spawnTimer);
            gameState.spawnTimer = null;
            gameState.sequenceQueue = [];
            gameState.sequenceNextIndex = 0;
            gameState.activeTargets.clear();
            const attemptDevs = (gameState.sequenceDevs && gameState.sequenceDevs.length) ? gameState.sequenceDevs : gameState.devices.slice(0, Math.min(3, gameState.activeCount || CONFIG.TOTAL_DEVICES));
            startSequenceRound(attemptDevs);
        }

        function startPairRound(devs) {
            if (devs.length < 2) {
                gameState.spawnTimer = setTimeout(spawnCycle, 400);
                return;
            }
            SoundManager.sfx.spawn();
            const colors = pickDistinctColors(2);
            const selected = devs.slice(0, 2);
            const decoys = devs.slice(2);
            gameState.activeTargets.clear();
            gameState.pairPending = new Set(selected.map(dev => dev.id));
            gameState.pairDevs = selected;
            selected.forEach((dev, idx) => {
                const color = colors[idx];
                dev.update(BITMAPS.CIRCLE, color, true);
                gameState.activeTargets.set(dev.id, { type: 'pair', color, completed: false });
            });
            decoys.forEach(dev => {
                const randomShape = Math.random() > 0.5 ? BITMAPS.CROSS : BITMAPS.SQUARE;
                const randomColor = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
                dev.update(randomShape, randomColor, false);
                gameState.activeTargets.set(dev.id, { type: 'invalid' });
            });
            ui.mission.innerText = `同時擊中 ${COLOR_LABELS[colors[0]]} & ${COLOR_LABELS[colors[1]]} 的圈圈，其他請勿碰`;
            updateTargetPreview(BITMAPS.CIRCLE, colors[0]);
            clearTimeout(gameState.pairTimer);
            gameState.pairTimer = setTimeout(() => restartPairRound('超時'), Math.max(1200, gameState.level.interval));
        }

        function restartPairRound(reason) {
            if (!gameState.isPlaying || !gameState.level || gameState.level.mode !== 'PAIR_SYNC') return;
            if (reason) log(`[Pair] ${reason}，重新開始`, 'log-sys');
            clearTimeout(gameState.pairTimer);
            gameState.pairTimer = null;
            gameState.activeTargets.clear();
            gameState.pairPending.clear();
            const redoDevs = (gameState.pairDevs && gameState.pairDevs.length) ? gameState.pairDevs : gameState.devices.slice(0, 2);
            startPairRound(redoDevs);
        }

        function startChaseRound(devs) {
            const candidates = devs.slice(0, Math.min(devs.length, 4));
            if (candidates.length === 0) {
                gameState.spawnTimer = setTimeout(spawnCycle, 400);
                return;
            }
            SoundManager.sfx.spawn();
            gameState.chaseSequence = candidates;
            gameState.chaseHopCount = 0;
            gameState.chaseMaxHops = Math.max(6, candidates.length * 3);
            ui.mission.innerText = '追上快速跳躍的光點！';
            advanceChaseHop();
        }

        function advanceChaseHop() {
            if (!gameState.isPlaying || gameState.level.mode !== 'CHASE_BEACON') return;
            const nextDev = gameState.chaseSequence[Math.floor(Math.random() * gameState.chaseSequence.length)];
            if (!nextDev) return;
            gameState.activeTargets.clear();
            gameState.chaseActiveId = nextDev.id;
            nextDev.update(BITMAPS.CIRCLE, 'green', true);
            gameState.activeTargets.set(nextDev.id, { type: 'chase', color: 'green' });
            updateTargetPreview(BITMAPS.CIRCLE, 'green');
            gameState.chaseHopCount += 1;
            if (gameState.chaseHopTimer) clearTimeout(gameState.chaseHopTimer);
            gameState.chaseHopTimer = setTimeout(() => {
                nextDev.clear();
                if (gameState.chaseHopCount >= gameState.chaseMaxHops) {
                    gameState.activeTargets.clear();
                    gameState.chaseActiveId = null;
                    gameState.chaseHopTimer = null;
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 400);
                } else {
                    advanceChaseHop();
                }
            }, 500 + Math.random() * 200);
        }

        function startCodeRound(devs) {
            if (devs.length === 0) {
                gameState.spawnTimer = setTimeout(spawnCycle, 400);
                return;
            }
            SoundManager.sfx.spawn();
            const targetColor = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
            const targetDigit = Math.floor(Math.random() * 10);
            const targetDev = devs[Math.floor(Math.random() * devs.length)];
            devs.forEach(dev => {
                if (dev.id === targetDev.id) {
                    dev.update(NUMBERS[targetDigit], targetColor, true);
                    gameState.activeTargets.set(dev.id, { type: 'code', color: targetColor, digit: targetDigit });
                } else {
                    const randDigit = Math.floor(Math.random() * 10);
                    const randColor = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
                    dev.update(NUMBERS[randDigit], randColor, false);
                    gameState.activeTargets.set(dev.id, { type: 'invalid' });
                }
            });
            gameState.codeTarget = { devId: targetDev.id, color: targetColor, digit: targetDigit };
            ui.mission.innerText = `按下 ${COLOR_LABELS[targetColor]} 的 ${targetDigit}`;
            updateTargetPreview(NUMBERS[targetDigit], targetColor);
            clearTimeout(gameState.spawnTimer);
            gameState.spawnTimer = setTimeout(spawnCycle, gameState.level.interval);
        }

        function startFrenzyRound(devs) {
            if (devs.length === 0) {
                gameState.spawnTimer = setTimeout(spawnCycle, 400);
                return;
            }
            SoundManager.sfx.spawn();
            const maxTargets = Math.min(3, devs.length);
            for (let i = 0; i < maxTargets; i++) {
                const dev = devs[i];
                const color = COLOR_POOL[i % COLOR_POOL.length];
                dev.update(BITMAPS.CIRCLE, color, true);
                gameState.activeTargets.set(dev.id, { type: 'frenzy', color });
            }
            ui.mission.innerText = '多重霓虹狂潮，盡快連擊！';
            updateTargetPreview(BITMAPS.CIRCLE, 'white');
            clearTimeout(gameState.spawnTimer);
            gameState.spawnTimer = setTimeout(spawnCycle, gameState.level.interval);
        }

        async function startMathQuickRound(devs) {
            if (devs.length === 0) {
                gameState.spawnTimer = setTimeout(spawnCycle, 400);
                return;
            }
            // 使用前六個裝置顯示選項 (ID 1-6)
            const candidates = devs.slice(0, Math.min(6, devs.length));
            SoundManager.sfx.spawn();
            // 產生答案 s 在 1..9
            const s = Math.floor(Math.random() * 8) + 2;
            const a = Math.floor(Math.random() * (s - 1)) + 1;
            const b = s - a;
            // 準備選項：包含正確答案 s 與不正確答案（0-9，但不等於 s）
            const options = [];
            options.push(s);
            while (options.length < candidates.length) {
                const v = Math.floor(Math.random() * 10);
                if (v === s) continue;
                options.push(v);
            }
            // 打亂選項
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }

            gameState.activeTargets.clear();
            // 指派選項給裝置
            candidates.forEach((dev, idx) => {
                const val = options[idx];
                dev.update(NUMBERS[val], 'white', val === s);
                gameState.activeTargets.set(dev.id, { type: 'math', correct: val === s, value: val });
            });

            ui.mission.innerText = `${a} + ${b} = ?`;
            // 語音提示
            clearTimeout(gameState.mathTimer);
            gameState.mathTarget = s;
            await speakAndLock(`${a} 加 ${b}`);
            // 設定 3 秒倒數
            gameState.mathTimer = setTimeout(() => {
                log(`[MATH] 時間到，答案 ${s} 未被擊中`, 'log-sys');
                SoundManager.sfx.bad();
                gameState.activeTargets.clear();
                clearTargetPreview();
                clearTimeout(gameState.spawnTimer);
                gameState.spawnTimer = setTimeout(spawnCycle, 200);
                gameState.mathTimer = null;
                gameState.mathTarget = null;
            }, 3000);
        }

        function pickDistinctColors(count) {
            const pool = [...COLOR_POOL];
            const picked = [];
            while (picked.length < count && pool.length) {
                const idx = Math.floor(Math.random() * pool.length);
                picked.push(pool.splice(idx, 1)[0]);
            }
            return picked;
        }

        function resetModeState() {
            gameState.sequenceQueue = [];
            gameState.sequenceNextIndex = 0;
            gameState.sequenceDevs = [];
            if (gameState.pairTimer) {
                clearTimeout(gameState.pairTimer);
                gameState.pairTimer = null;
            }
            gameState.pairPending.clear();
            gameState.pairDevs = [];
            if (gameState.chaseHopTimer) {
                clearTimeout(gameState.chaseHopTimer);
                gameState.chaseHopTimer = null;
            }
            gameState.chaseSequence = [];
            gameState.chaseActiveId = null;
            gameState.chaseHopCount = 0;
            gameState.chaseMaxHops = 0;
            gameState.codeTarget = null;
        }

        // devId: slot id; inputValue: optional numeric payload from device (0x00 or 0x01)
        function handleDeviceInput(devId, inputValue) {
            const engPanel = document.getElementById('engPanel');
            if (engPanel.style.display === 'flex') {
                log(`[Engineering] RX: Device ${devId} Hit!`, 'log-rx');
                return;
            }

            const fromDevice = (typeof inputValue === 'number');
            if (fromDevice && inputValue === 0) {
                gameState.score = Math.max(0, gameState.score - 2);
                log(`[RX] Dev ${devId} -> 0x00 未命中 (-2)`, 'log-rx');
                SoundManager.sfx.bad();
                ui.score.innerText = gameState.score;
                return;
            }

            if (!gameState.isPlaying) return;
            const info = gameState.activeTargets.get(devId);
            const dev = gameState.devices.find(d => d.id === devId);

            if (!info) {
                if (gameState.level && gameState.level.mode === 'PAIR_SYNC' && gameState.pairPending.size > 0) {
                    const penalty = 5;
                    gameState.score = Math.max(0, gameState.score - penalty);
                    log(`[RX] Dev ${devId} -> 雙子錯誤 (-${penalty})`, 'log-rx');
                    SoundManager.sfx.bad();
                    ui.score.innerText = gameState.score;
                    restartPairRound('錯誤按鍵');
                    return;
                }
                if (gameState.level && gameState.level.mode === 'SEQUENCE_STRIKE') {
                    const penalty = 8;
                    gameState.score = Math.max(0, gameState.score - penalty);
                    log(`[RX] Dev ${devId} -> 順序分心 (-${penalty})`, 'log-rx');
                    SoundManager.sfx.bad();
                    ui.score.innerText = gameState.score;
                    restartSequenceRound('誤觸雜訊');
                    return;
                }
                // If device reported a press and there's no active target here, penalize
                gameState.score -= 2;
                log(`[RX] Dev ${devId} -> 無目標 (-2)`, 'log-rx');
                SoundManager.sfx.bad();
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'sequence') {
                if (info.completed) return;
                if (gameState.sequenceNextIndex !== info.order) {
                    const penalty = 10;
                    gameState.score = Math.max(0, gameState.score - penalty);
                    log(`[RX] Dev ${devId} -> 順序錯誤 (-${penalty})`, 'log-rx');
                    SoundManager.sfx.bad();
                    dev.showResult(false);
                    ui.score.innerText = gameState.score;
                    restartSequenceRound('順序錯誤');
                    return;
                }
                const pts = 15;
                gameState.score += pts;
                info.completed = true;
                log(`[RX] Dev ${devId} -> 連鎖命中 (+${pts})`, 'log-rx');
                SoundManager.sfx.hit();
                dev.showResult(true);
                gameState.sequenceNextIndex += 1;
                if (gameState.sequenceNextIndex >= gameState.sequenceQueue.length) {
                    gameState.sequenceQueue = [];
                    gameState.sequenceNextIndex = 0;
                    gameState.activeTargets.clear();
                    clearTargetPreview();
                    gameState.sequenceDevs = [];
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 700);
                } else {
                    const next = gameState.sequenceQueue[gameState.sequenceNextIndex];
                    const nextDev = gameState.devices.find(d => d.id === next.devId);
                    if (nextDev) nextDev.update(NUMBERS[next.digit], next.color, true);
                    updateTargetPreview(NUMBERS[next.digit], next.color);
                }
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'pair') {
                if (info.completed) return;
                info.completed = true;
                gameState.pairPending.delete(devId);
                const pts = 15;
                gameState.score += pts;
                log(`[RX] Dev ${devId} -> 雙子命中 (+${pts})`, 'log-rx');
                SoundManager.sfx.hit();
                dev.showResult(true);
                if (gameState.pairPending.size === 0) {
                    clearTimeout(gameState.pairTimer);
                    gameState.pairTimer = null;
                    gameState.activeTargets.clear();
                    gameState.pairPending.clear();
                    clearTargetPreview();
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 400);
                    gameState.pairDevs = [];
                }
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'chase') {
                if (gameState.chaseActiveId !== devId) {
                    const pen = 5;
                    gameState.score = Math.max(0, gameState.score - pen);
                    log(`[RX] Dev ${devId} -> 追擊失焦 (-${pen})`, 'log-rx');
                    SoundManager.sfx.bad();
                    dev.showResult(false);
                    ui.score.innerText = gameState.score;
                    return;
                }
                const pts = 20;
                gameState.score += pts;
                log(`[RX] Dev ${devId} -> 追擊成功 (+${pts})`, 'log-rx');
                SoundManager.sfx.hit();
                dev.showResult(true);
                clearTimeout(gameState.chaseHopTimer);
                gameState.chaseHopTimer = null;
                gameState.chaseActiveId = null;
                gameState.activeTargets.clear();
                clearTargetPreview();
                clearTimeout(gameState.spawnTimer);
                setTimeout(spawnCycle, 400);
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'code') {
                const target = gameState.codeTarget;
                if (target && devId === target.devId) {
                    const pts = 20;
                    gameState.score += pts;
                    log(`[RX] Dev ${devId} -> 彩碼命中 (+${pts})`, 'log-rx');
                    SoundManager.sfx.hit();
                    dev.showResult(true);
                    clearTargetPreview();
                    gameState.activeTargets.clear();
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 500);
                } else {
                    const penalty = 10;
                    gameState.score = Math.max(0, gameState.score - penalty);
                    log(`[RX] Dev ${devId} -> 彩碼錯誤 (-${penalty})`, 'log-rx');
                    SoundManager.sfx.bad();
                    dev.showResult(false);
                }
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'math') {
                const isCorrect = info.correct;
                if (isCorrect) {
                    const pts = 15;
                    gameState.score += pts;
                    log(`[RX] Dev ${devId} -> 數學命中 (+${pts})`, 'log-rx');
                    SoundManager.sfx.hit();
                    dev.showResult(true);
                    // 取消倒數並排下一題
                    if (gameState.mathTimer) { clearTimeout(gameState.mathTimer); gameState.mathTimer = null; }
                    gameState.activeTargets.clear();
                    clearTargetPreview();
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 300);
                } else {
                    const pen = 5;
                    gameState.score = Math.max(0, gameState.score - pen);
                    log(`[RX] Dev ${devId} -> 數學錯誤 (-${pen})`, 'log-rx');
                    SoundManager.sfx.bad();
                    dev.showResult(false);
                    // 不立即結束，讓玩家在剩餘時間內繼續嘗試
                }
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'frenzy') {
                const pts = 12;
                gameState.score += pts;
                log(`[RX] Dev ${devId} -> 霓虹命中 (+${pts})`, 'log-rx');
                SoundManager.sfx.hit();
                dev.showResult(true);
                gameState.activeTargets.delete(devId);
                if (gameState.activeTargets.size === 0) {
                    clearTargetPreview();
                    clearTimeout(gameState.spawnTimer);
                    gameState.spawnTimer = setTimeout(spawnCycle, 300);
                }
                ui.score.innerText = gameState.score;
                return;
            }

            if (info.type === 'valid') {
                const pts = (gameState.level.mode === 'LOGIC_CHAOS' || gameState.level.mode === 'NUMBER_HUNT') ? 20 : 10;
                gameState.score += pts;
                log(`[RX] Dev ${devId} -> 命中! (+${pts})`, 'log-rx');
                SoundManager.sfx.hit();
                dev.showResult(true);
                // 若正在等待按下，取消等待並立即排程下一輪
                if (gameState.awaitingPress) {
                    gameState.awaitingPress = false;
                }
                // 清除目前目標預覽（玩家已命中）
                clearTargetPreview();
                queueSpawnAfterDelay(300);
                gameState.activeTargets.clear();
            } else {
                const pen = info.type === 'bomb' ? 30 : 10;
                gameState.score = Math.max(0, gameState.score - pen);
                log(`[RX] Dev ${devId} -> 失誤 (-${pen})`, 'log-rx');
                SoundManager.sfx.bad();
                dev.showResult(false);
                if (gameState.level && gameState.level.mode === 'PAIR_SYNC') {
                    restartPairRound('誤觸目標');
                    return;
                }
                if (gameState.level && gameState.level.mode === 'SEQUENCE_STRIKE') {
                    restartSequenceRound('誤觸目標');
                    return;
                }
            }
            ui.score.innerText = gameState.score;
        }

        // ==========================================
        // 6. 工程模式邏輯
        // ==========================================
        function initEngineeringUI() {
            const toggleBtn = document.getElementById('engToggleBtn');
            const panel = document.getElementById('engPanel');
            const devList = document.getElementById('engDevList');
            const clearLogBtn = document.getElementById('engClearLogBtn');
            const sendBtn = document.getElementById('engSendBtn');
            const connectBtn = document.getElementById('engConnectBtn');

            toggleBtn.addEventListener('click', () => {
                const isShown = panel.style.display === 'flex';
                panel.style.display = isShown ? 'none' : 'flex';
                toggleBtn.classList.toggle('active', !isShown);
                if (gameState.isPlaying && !isShown) {
                    endGame();
                    log("[System] 切換至工程模式，遊戲已停止。", 'log-sys');
                }
            });

            devList.innerHTML = '';
            const allLabel = document.createElement('label');
            allLabel.className = 'dev-checkbox-label';
            allLabel.innerHTML = `<input type="checkbox" id="engDevAll"> All`;
            devList.appendChild(allLabel);

            for (let i = 1; i <= CONFIG.TOTAL_DEVICES; i++) {
                const label = document.createElement('label');
                label.className = 'dev-checkbox-label';
                label.innerHTML = `<input type="checkbox" class="eng-dev-chk" value="${i}"> Dev ${i}`;
                devList.appendChild(label);
            }

            document.getElementById('engDevAll').addEventListener('change', (e) => {
                const chks = document.querySelectorAll('.eng-dev-chk');
                chks.forEach(chk => chk.checked = e.target.checked);
            });

            clearLogBtn.addEventListener('click', () => {
                ui.log.innerHTML = '';
                log("Log 已清除", 'log-sys');
            });

            connectBtn.addEventListener('click', async () => {
                const selected = getSelectedDeviceIds();
                if (selected.length === 0) return log("[Eng] 未選擇裝置", 'log-sys');
                log(`[Eng] 嘗試連接: ${selected.join(', ')}`, 'log-sys');
                for (let id of selected) {
                    const dev = gameState.devices.find(d => d.id === id);
                    if (dev) await dev.connect();
                }
            });

            // engConnectRealBtn 已移除

            sendBtn.addEventListener('click', () => {
                const selected = getSelectedDeviceIds();
                if (selected.length === 0) return log("[Eng] 未選擇目標裝置", 'log-sys');
                const patternKey = document.getElementById('engPatternSelect').value;
                const color = document.getElementById('engColorSelect').value;
                const isTarget = document.getElementById('engIsTarget').checked;
                const bitmap = BITMAPS[patternKey] || BITMAPS.CLEAR;
                log(`[Eng] 發送: ${patternKey} (${color}), Tag=${isTarget}`, 'log-sys');
                selected.forEach(id => {
                    const dev = gameState.devices.find(d => d.id === id);
                    if (dev) dev.update(bitmap, color, isTarget);
                });
            });
        }

        function getSelectedDeviceIds() {
            const chks = document.querySelectorAll('.eng-dev-chk:checked');
            return Array.from(chks).map(chk => parseInt(chk.value));
        }

        function initSingleBleUI() {
            const btnSingleConnect = document.getElementById('btnSingleConnect');
            const btnSingleSend = document.getElementById('btnSingleSend');
            const singlePatternSelect = document.getElementById('singlePatternSelect');
            const singleColorSelect = document.getElementById('singleColorSelect');
            const singleIsTarget = document.getElementById('singleIsTarget');
            const eventArea = document.getElementById('eventArea');
            const slotId = 1;
            const maxEventLines = 30;

            if (!btnSingleConnect || !btnSingleSend || !singlePatternSelect || !singleColorSelect || !singleIsTarget || !eventArea) {
                return;
            }

            const renderEvent = (value, fromSlotId) => {
                const hex = Array.from(value).map(b => b.toString(16).padStart(2, '0')).join(' ');
                const nextLine = `[EVENT][Slot ${fromSlotId}] ${new Date().toLocaleTimeString()} ${hex}`;
                const oldLines = eventArea.innerText ? eventArea.innerText.split('\n') : [];
                const newLines = [nextLine, ...oldLines].slice(0, maxEventLines);
                eventArea.innerText = newLines.join('\n');
            };

            RealBLEAdapter.subscribeRx(slotId, (value, fromSlotId) => {
                renderEvent(value, fromSlotId);
            });

            btnSingleConnect.addEventListener('click', async () => {
                btnSingleConnect.disabled = true;
                log('[BLE] 嘗試與單一裝置連線...', 'log-sys');
                setConnectingSlot(slotId, true);
                setDeviceNameOnTile(slotId, '掃描中...');

                const ok = await RealBLEAdapter.requestAndConnect(slotId, { serviceOnly: true });

                setConnectingSlot(slotId, false);
                btnSingleConnect.disabled = false;
                if (ok) {
                    btnSingleSend.disabled = false;
                    log('[BLE] 單一裝置已連線 (Slot 1)', 'log-sys');
                } else {
                    log('[BLE] 單一裝置連線失敗', 'log-sys');
                }
            });

            btnSingleSend.addEventListener('click', async () => {
                if (!RealBLEAdapter.hasConnection(slotId)) {
                    log('[BLE] 尚未連線到 Slot 1', 'log-sys');
                    return;
                }

                const patternKey = singlePatternSelect.value;
                const color = singleColorSelect.value;
                const isTarget = singleIsTarget.checked;
                const bitmap = BITMAPS[patternKey] || BITMAPS.CLEAR;
                const payload = PROTOCOL.pack(bitmap, color, isTarget);

                log(`[BLE TEST] Sending ${patternKey} color=${color} target=${isTarget}`, 'log-sys');
                const ok = await RealBLEAdapter.write(slotId, payload);
                if (ok) log('[BLE TX] send OK', 'log-tx');
                else log('[BLE TX] send FAIL', 'log-sys');
            });
        }

        init();
    </script>
</body>

</html>
